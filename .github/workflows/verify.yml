name: verify

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Clean-checkout import smoke
        run: |
          python -c "import pmm1.main"
          python -c "import pmm2.runtime.loops"
          python -c "from pmm1.tools.backfill_spine import main as _backfill_main"
          python -c "from pmm1.tools.rebuild_spine_facts import main as _rebuild_main"

      - name: Pytest
        run: pytest -q

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy .
