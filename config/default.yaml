bot:
  name: PMM-1
  env: prod
  max_markets: 12
  quote_cycle_ms: 1000
  reconcile_orders_s: 30
  reconcile_positions_s: 60
  paper_mode: false
  paper_nav: 100.0

wallet:
  type: EOA
  chain_id: 137

market_filters:
  min_time_to_end_hours: 12
  min_volume_24h_usd: 50000
  max_top_spread_cents: 5
  min_depth_within_2c_shares: 0
  allow_sports: true
  allow_crypto_intraday: false
  require_clear_rules: true

strategy:
  enable_binary_parity: true
  enable_neg_risk_arb: false
  enable_market_making: true
  enable_directional_overlay: false

pricing:
  base_half_spread_cents: 0.5
  inventory_skew_gamma: 0.002
  cluster_skew_eta: 0.001
  take_threshold_cents: 0.8
  reward_capture_weight: 0.7
  target_dollar_size: 8.0
  max_dollar_size: 15.0

risk:
  per_market_gross_nav: 0.08
  per_event_cluster_nav: 0.15
  total_directional_nav: 0.30
  total_arb_gross_nav: 0.25
  daily_pause_drawdown_nav: 0.015
  daily_wider_drawdown_nav: 0.025
  daily_flatten_drawdown_nav: 0.04

exit:
  take_profit:
    enabled: true
    threshold_pct: 0.15
    partial_exit_pct: 0.50
    full_exit_pct: 0.30
    min_hold_minutes: 30
    cooldown_minutes: 10
  stop_loss:
    enabled: true
    threshold_pct: 0.20
    hard_stop_pct: 0.40
    max_loss_per_trade_usd: 5.0
  resolution:
    enabled: true
    exit_start_hours: 6
    exit_complete_hours: 2
    aggressive_after_hours: 1
    block_new_buys_hours: 8
  flatten:
    config_flag_path: "/tmp/pmm1_flatten"
    price_tolerance_pct: 0.05
  orphan:
    check_interval_s: 60
    min_size_to_unwind: 5.0
  inventory_skew:
    gamma_max: 0.05
    age_halflife_hours: 4.0
  fill_escalation:
    enabled: true
    level_1_secs: 900      # 15 min
    level_1_ticks: 1
    level_2_secs: 1800     # 30 min
    level_2_ticks: 2
    level_3_secs: 2700     # 45 min
    level_3_ticks: 3
    taker_enabled: true    # Live mode also requires PMM1_ACK_TAKER_BOOTSTRAP=YES
    taker_trigger_secs: 1200  # 20 min
    taker_min_shares: 5.0

execution:
  post_only: true
  order_ttl_effective_s: 30
  heartbeat_s: 5
  ws_stale_kill_s: 10
  max_batch_orders: 15
  retry_backoff_initial_ms: 1000
  retry_backoff_max_ms: 30000

# PMM-2 (Advanced Market Maker) — SHADOW MODE ENABLED (Sprint 9)
pmm2:
  enabled: true  # Shadow mode enabled for validation
  shadow_mode: true  # True = log decisions, don't execute
  live_capital_pct: 0.0  # Live mode requires shadow_mode=false and PMM1_ACK_PMM2_LIVE=YES
  
  # Loop cadences (seconds unless noted)
  allocator_interval_sec: 60.0
  scoring_check_sec: 30.0
  universe_refresh_sec: 300.0
  queue_update_ms: 250.0
  medium_loop_sec: 10.0
  
  # Limits
  max_markets_active: 12
  max_slots_total: 48
  
  # Allocator scoring parameters
  min_positive_return_bps: 6.0
  corr_penalty_lambda: 0.20
  churn_penalty_phi: 0.15
  queue_uncertainty_psi: 0.10
  
  # Persistence parameters
  hysteresis_base_usdc: 0.25
  scoring_extra_usdc: 0.40
  eta_extra_usdc: 0.30
  max_reprices_per_minute: 2
  
  # Risk limits (NAV fractions)
  per_market_cap_nav: 0.03
  per_event_cap_nav: 0.06
  total_active_cap_nav: 0.30
  per_market_cap_floor: 8.0

# V3 Canary Configuration — Gradual ramp of V3 fair value signals
v3:
  enabled: false                     # Master kill switch
  max_skew_cents: 1.0                # Max V3 can move fair value (in cents)
  redis_url: "redis://localhost:6379"
  min_confidence: 0.70               # Minimum confidence to use V3 signal (1 - uncertainty)
  signal_max_age_seconds: 300.0      # Max age before falling back to midpoint

ops:
  runtime_status_path: "./data/runtime_status.json"
  alert_cooldown_s: 300
  status_stale_after_s: 45
  no_active_quotes_after_s: 180
  no_active_quotes_min_markets: 1
  reconnect_storm_window_s: 300
  reconnect_storm_threshold: 5
  excessive_churn_window_s: 600
  excessive_churn_ratio: 2.0
  excessive_churn_min_cancels: 25
  recent_failure_window_s: 900
