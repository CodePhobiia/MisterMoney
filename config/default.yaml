bot:
  name: PMM-1
  env: prod
  max_markets: 20
  quote_cycle_ms: 250
  reconcile_orders_s: 30
  reconcile_positions_s: 60
  paper_mode: false
  paper_nav: 100.0

wallet:
  type: EOA
  chain_id: 137

market_filters:
  min_time_to_end_hours: 24
  min_volume_24h_usd: 1000
  max_top_spread_cents: 10
  min_depth_within_2c_shares: 0
  allow_sports: false
  allow_crypto_intraday: false
  require_clear_rules: true

strategy:
  enable_binary_parity: true
  enable_neg_risk_arb: true
  enable_market_making: true
  enable_directional_overlay: false

pricing:
  base_half_spread_cents: 1.0
  inventory_skew_gamma: 0.015
  cluster_skew_eta: 0.02
  take_threshold_cents: 0.8
  reward_capture_weight: 0.7

risk:
  per_market_gross_nav: 0.08
  per_event_cluster_nav: 0.15
  total_directional_nav: 0.30
  total_arb_gross_nav: 0.40
  daily_pause_drawdown_nav: 0.015
  daily_flatten_drawdown_nav: 0.04

exit:
  take_profit:
    enabled: true
    threshold_pct: 0.15
    partial_exit_pct: 0.50
    full_exit_pct: 0.30
    min_hold_minutes: 30
    cooldown_minutes: 10
  stop_loss:
    enabled: true
    threshold_pct: 0.20
    hard_stop_pct: 0.40
    max_loss_per_trade_usd: 5.0
  resolution:
    enabled: true
    exit_start_hours: 6
    exit_complete_hours: 2
    aggressive_after_hours: 1
    block_new_buys_hours: 8
  flatten:
    config_flag_path: "/tmp/pmm1_flatten"
    price_tolerance_pct: 0.05
  orphan:
    check_interval_s: 60
    min_size_to_unwind: 5.0
  inventory_skew:
    gamma_max: 0.05
    age_halflife_hours: 4.0

execution:
  post_only: true
  order_ttl_effective_s: 30
  heartbeat_s: 5
  ws_stale_kill_s: 10
  max_batch_orders: 15
  retry_backoff_initial_ms: 1000
  retry_backoff_max_ms: 30000
